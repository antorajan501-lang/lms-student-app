name: lms_student_app
description: "TekQuora LMS Student App — connected to existing Laravel backend."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^14.6.2

  # Images
  cached_network_image: ^3.4.1

  # Video
  video_player: ^2.9.2
  chewie: ^1.8.5

  # UI
  shimmer: ^3.0.0
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  lottie: ^3.1.3
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  readmore: ^3.0.0
  carousel_slider: ^5.0.0
  flutter_html: ^3.0.0-beta.2
  webview_flutter: ^4.10.0
  flutter_pdfview: ^1.3.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6

  # Utilities
  connectivity_plus: ^6.1.2
  share_plus: ^10.1.3
  url_launcher: ^6.3.1
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  # Misc
  cupertino_icons: ^1.0.8
  equatable: ^2.0.5
  dartz: ^0.10.1
  get_it: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon-512x512.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon-512x512.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
